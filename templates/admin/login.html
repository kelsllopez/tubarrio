{% load i18n static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — TuBarrio Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber:  #F59E0B;
    --orange: #f97316;
    --surface:#060d1a;
    --card:   #0b1628;
    --border: #172035;
    --text:   #e2e8f0;
    --muted:  #4a5a7a;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Fondo con degradados de luz ── */
  .tb-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 55% 45% at 12% 18%, rgba(249,115,22,0.13) 0%, transparent 65%),
      radial-gradient(ellipse 45% 55% at 85% 75%, rgba(245,158,11,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 35% 30% at 88% 88%, rgba(239,68,68,0.06) 0%, transparent 55%),
      linear-gradient(160deg, #060d1a 0%, #07101e 50%, #060c18 100%);
  }

  /* ── Skyline SVG ── */
  .tb-skyline {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 42vh;
    z-index: 1;
    pointer-events: none;
  }

  /* ── Estrellas ── */
  .tb-stars {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .tb-star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--lo,.05); }
    50%      { opacity: var(--hi,.45); }
  }

  /* ── Orbes de luz ── */
  .tb-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(50px);
    pointer-events: none;
    z-index: 2;
    animation: floatorb var(--d,9s) ease-in-out infinite var(--dl,0s);
  }
  @keyframes floatorb {
    0%,100% { transform: translateY(0) translateX(0); }
    50%     { transform: translateY(-18px) translateX(12px); }
  }

  /* ── Centrado perfecto ── */
  .tb-page {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    gap: 0;
  }

  /* ── Wrapper único que contiene logo + form ── */
  .tb-wrapper {
    width: 100%;
    max-width: 400px;
    animation: riseUp .75s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes riseUp {
    from { opacity:0; transform: translateY(28px) scale(.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* ── Logo dentro del card ── */
  .tb-logo {
    text-align: center;
    padding: 2.2rem 2rem 1.6rem;
    background: rgba(11,22,40,0.92);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(245,158,11,0.14);
    border-bottom: none;
    border-radius: 22px 22px 0 0;
    position: relative;
    overflow: hidden;
  }
  /* Línea superior ámbar */
  .tb-logo::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2.5px;
    background: linear-gradient(90deg, transparent 5%, #F59E0B 40%, #f97316 60%, transparent 95%);
  }

  .tb-pin {
    font-size: 2.8rem;
    display: block;
    margin-bottom: .4rem;
    filter: drop-shadow(0 0 16px rgba(245,158,11,.65));
    animation: pulsein 2.5s ease-in-out infinite;
  }
  @keyframes pulsein {
    0%,100% { filter: drop-shadow(0 0 16px rgba(245,158,11,.65)); }
    50%      { filter: drop-shadow(0 0 28px rgba(249,115,22,.95)); }
  }

  .tb-brand-name {
    font-family: 'Fraunces', serif;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -.04em;
    line-height: 1;
    background: linear-gradient(135deg, #F59E0B 0%, #f97316 55%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }

  .tb-brand-sub {
    font-size: .7rem;
    font-weight: 500;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: .45rem;
    display: block;
  }

  /* ── Formulario ── */
  .tb-form-card {
    background: rgba(9,18,34,0.95);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(245,158,11,0.10);
    border-top: 1px solid rgba(245,158,11,0.06);
    border-radius: 0 0 22px 22px;
    padding: 1.8rem 2rem 2rem;
    position: relative;
  }

  /* Separador entre logo y form */
  .tb-divider {
    display: flex;
    align-items: center;
    gap: .6rem;
    margin-bottom: 1.5rem;
    color: var(--amber);
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  .tb-divider::before, .tb-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(245,158,11,.18);
  }

  /* Errores */
  .tb-error {
    background: rgba(239,68,68,.09);
    border: 1px solid rgba(239,68,68,.25);
    border-radius: 10px;
    color: #fca5a5;
    font-size: .82rem;
    padding: .65rem 1rem;
    margin-bottom: 1rem;
  }

  /* Inputs */
  .tb-input-wrap {
    position: relative;
    margin-bottom: .85rem;
  }

  .tb-input-wrap input {
    width: 100%;
    background: rgba(6,13,26,.8);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .88rem;
    padding: .82rem 1rem .82rem 2.8rem;
    transition: border-color .18s ease, box-shadow .18s ease;
    outline: none;
  }
  .tb-input-wrap input::placeholder { color: var(--muted); }
  .tb-input-wrap input:focus {
    border-color: rgba(245,158,11,.55);
    box-shadow: 0 0 0 3px rgba(245,158,11,.07), 0 0 18px rgba(245,158,11,.04);
  }

  .tb-input-icon {
    position: absolute;
    left: .9rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    pointer-events: none;
    opacity: .5;
  }

  /* Botón */
  .tb-btn {
    width: 100%;
    margin-top: .4rem;
    background: linear-gradient(135deg, #F59E0B 0%, #f97316 100%);
    color: #060d1a;
    border: none;
    border-radius: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .04em;
    padding: .9rem;
    cursor: pointer;
    transition: opacity .2s, transform .2s, box-shadow .2s;
    box-shadow: 0 4px 18px rgba(245,158,11,.28);
  }
  .tb-btn:hover {
    opacity: .92;
    transform: translateY(-1px);
    box-shadow: 0 8px 26px rgba(245,158,11,.38);
  }
  .tb-btn:active { transform: translateY(0); }

  /* Footer */
  .tb-footer {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: .68rem;
    color: #1b2c42;
    letter-spacing: .05em;
    white-space: nowrap;
  }

  </style>
</head>

<!-- Contenido principal centrado -->
<div class="tb-page">
  <div class="tb-wrapper">

    <!-- Logo -->
    <div class="tb-logo">
      <span class="tb-pin">📍</span>
      <span class="tb-brand-name">TuBarrio</span>
      <span class="tb-brand-sub">Panel de administración · Loncoche</span>
    </div>

    <!-- Formulario -->
    <div class="tb-form-card">

      <div class="tb-divider">Acceso seguro</div>

      {% if form.errors %}
        <div class="tb-error">⚠️ Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form action="{{ app_path }}" method="post" id="login-form">
        {% csrf_token %}

        <div class="tb-input-wrap">
          <span class="tb-input-icon">👤</span>
          <input type="text" name="username" id="id_username"
                 placeholder="Nombre de usuario"
                 autocomplete="username"
                 value="{{ form.username.value|default:'' }}"
                 autofocus required>
        </div>

        <div class="tb-input-wrap">
          <span class="tb-input-icon">🔒</span>
          <input type="password" name="password" id="id_password"
                 placeholder="Contraseña"
                 autocomplete="current-password"
                 required>
        </div>

        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% else %}
          <input type="hidden" name="next" value="/admin/">
        {% endif %}

        <button type="submit" class="tb-btn">Iniciar sesión →</button>

      </form>
    </div>

  </div>
</div>

<!-- Footer -->
<p class="tb-footer">TuBarrio © 2026 — Loncoche, Araucanía</p>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Generar estrellas
  const wrap = document.getElementById('tb-stars');
  for (let i = 0; i < 65; i++) {
    const s = document.createElement('div');
    s.className = 'tb-star';
    const sz = Math.random() * 2 + .8;
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `top:${Math.random()*68}%`, `left:${Math.random()*100}%`,
      `--d:${(Math.random()*3+2).toFixed(1)}s`,
      `--dl:${(Math.random()*5).toFixed(1)}s`,
      `--lo:${(Math.random()*.07+.03).toFixed(2)}`,
      `--hi:${(Math.random()*.35+.2).toFixed(2)}`
    ].join(';');
    wrap.appendChild(s);
  }
});
</script>
