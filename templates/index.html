{% load static %}
<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#FDFAF4"/>
  <meta name="description" content="Negocios locales  - Descubre emprendimientos cerca de ti">
  <meta property="og:title" content="TuBarrio">  
  <title>TuBarrio — Descubre lo que hay en tu barrio</title>

  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'css/tubarrio.css' %}"/>
</head>
<body>

<div id="map"></div>

<div class="topbar" role="banner">
  <div class="logo" aria-label="TuBarrio">Tu<span>Barrio</span><span class="flag" aria-hidden="true"></span></div>
  <div class="search-wrap" id="searchWrap" role="search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8A7768" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="search" placeholder="Buscar negocio o dirección…" oninput="onSearch(this)" autocomplete="off" enterkeyhint="search"/>
    <button class="search-clear" onclick="clearSearch()" title="Limpiar" aria-label="Limpiar búsqueda">✕</button>
  </div>
  <button class="btn-gps" id="gpsBtn" onclick="useGPS()" aria-describedby="gpsHint">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    <span>Mi ubicación</span>
  </button>
  <a href="{% url 'ingresa_tu_negocio' %}" class="btn-reg">+ Registrar</a>
</div>
<div class="sr-only" id="gpsHint">Activa tu GPS para ver negocios cerca y ordenar por distancia.</div>

<div class="filters" id="filtersBar" role="navigation" aria-label="Filtros por categoría">
  <button class="fcat on" onclick="filterBy(this,'all')" aria-pressed="true" data-cat="all">🗂 Todos</button>
  <button class="fcat" onclick="filterBy(this,'comida')" aria-pressed="false" data-cat="comida">
    <span class="dot-cat" style="background:#F5A623"></span>Comida
  </button>
  <button class="fcat" onclick="filterBy(this,'mini_market')" aria-pressed="false" data-cat="mini_market">
    <span class="dot-cat" style="background:#5F8C68"></span>Almacenes
  </button>
  <button class="fcat" onclick="filterBy(this,'belleza')" aria-pressed="false" data-cat="belleza">
    <span class="dot-cat" style="background:#E05C8A"></span>Belleza
  </button>
  <button class="fcat" onclick="filterBy(this,'panaderia')" aria-pressed="false" data-cat="panaderia">
    <span class="dot-cat" style="background:#C0824A"></span>Panadería
  </button>
  <button class="fcat" onclick="filterBy(this,'servicios')" aria-pressed="false" data-cat="servicios">
    <span class="dot-cat" style="background:#4A90D9"></span>Servicios
  </button>
  <button class="fcat" onclick="filterBy(this,'emprendimiento')" aria-pressed="false" data-cat="emprendimiento">
    <span class="dot-cat" style="background:#9B59B6"></span>Emprendimientos
  </button>
</div>

<div class="panel hidden" id="panel">
  <div class="panel-head">
    <h3>Negocios</h3>
    <div class="panel-controls">
      <span class="count-badge" id="countBadge">0</span>
      <button class="btn-collapse" onclick="togglePanel()" aria-label="Cerrar lista">✕</button>
    </div>
  </div>
  <div class="panel-sort">
    <button class="sort-btn on" onclick="setSort(this,'default')">Recientes</button>
    <button class="sort-btn" onclick="setSort(this,'az')">A–Z</button>
    <button class="sort-btn" onclick="setSort(this,'cercano')">Cerca mío</button>
  </div>
  <div class="panel-list" id="panelList" role="list"></div>
</div>
<button class="btn-open-panel" id="openPanelBtn" onclick="togglePanel()" aria-label="Ver lista">≡ Lista</button>

<div class="zone-info">📍 <strong id="zoneCount">0</strong> negocios</div>

<div class="live-badge" id="liveBadge">
  <div class="live-dot"></div>
  <span>En vivo · <strong id="liveCount">0</strong> negocios</span>
</div>

<div class="statusbar" id="statusBar" aria-live="polite" aria-atomic="true"></div>

<div class="modal-ov" id="detailModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="m-banner" id="mBanner"></div>
    <div class="m-body">
      <div class="m-name" id="mName"></div>
      <div class="m-catl" id="mCat"></div>
      
      <div class="m-tabs">
        <button class="m-tab active" id="tabDetalles" onclick="switchTab('detalles')">📋 Detalles</button>
        <button class="m-tab" id="tabFotos" onclick="switchTab('fotos')">📸 Fotos <span class="m-tab-count" id="fotosCount">0</span></button>
      </div>
      
      <div class="m-tab-content active" id="contentDetalles">
      <div class="m-info" id="mInfo" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>
      
      <div class="m-tab-content" id="contentFotos">
        <div id="mGallery"></div>
      </div>
      
      <div class="m-actions" id="mActions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<noscript><div class="noscript">Necesitas JavaScript para usar el mapa de TuBarrio.</div></noscript>

<script>
  window.TB_CONFIG = {
    negocios:     {{ negocios_json|safe }},
    urlRegistrar: "{% url 'ingresa_tu_negocio' %}",
    urlApi:       "{% url 'api_negocios' %}"
  };
</script>

<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script defer src="{% static 'js/tubarrio.js' %}"></script>

</body>
</html>
