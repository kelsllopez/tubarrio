{% load static %}
<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuBarrio 🇨🇱 — Descubre lo que hay en tu barrio</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:#F6F1E9; --warm:#EDE4D6; --bark:#241A10;
      --terra:#C2522A; --gold:#D4A540; --sage:#5F8C68;
      --dust:#8A7768; --card:#FDFAF4; --red:#D0302A;
      --shadow-sm: 0 2px 12px rgba(36,26,16,.08);
      --shadow-md: 0 8px 32px rgba(36,26,16,.12);
      --shadow-lg: 0 20px 60px rgba(36,26,16,.18);
      --radius: 16px;
      --panel-w: 360px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--bark)}

    /* ── MAP ── */
    #map{position:fixed;inset:0;z-index:1;width:100vw;height:100vh;transition:right .35s cubic-bezier(.4,0,.2,1)}
    body.panel-open #map{right:var(--panel-w)}

    /* ════════════════════════════
       TOPBAR DESKTOP — flex fila única
       logo | buscador | gps | registrar
    ════════════════════════════ */
    .topbar{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;gap:.6rem;
      padding:.75rem 1.1rem;
      background:rgba(253,250,244,.97);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(36,26,16,.07);
      box-shadow:var(--shadow-sm);
      transition:right .35s cubic-bezier(.4,0,.2,1);
    }
    body.panel-open .topbar{right:var(--panel-w)}

    .logo{
      font-family:'Fraunces',serif;font-weight:900;font-size:1.3rem;
      color:var(--bark);letter-spacing:-.03em;
      display:flex;align-items:center;gap:.25rem;white-space:nowrap;flex-shrink:0;
    }
    .logo span{color:var(--terra)}
    .logo .flag{font-size:1rem;margin-left:.1rem}

    .search-wrap{
      flex:1;max-width:380px;
      display:flex;align-items:center;gap:.5rem;
      background:var(--warm);border-radius:12px;
      padding:.5rem .9rem;border:1.5px solid transparent;
      transition:border-color .2s,box-shadow .2s,background .2s;
    }
    .search-wrap:focus-within{border-color:var(--terra);background:var(--card);box-shadow:0 0 0 3px rgba(194,82,42,.1)}
    .search-wrap input{border:none;background:transparent;outline:none;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--bark);width:100%}
    .search-wrap input::placeholder{color:var(--dust)}
    .search-clear{display:none;background:none;border:none;cursor:pointer;color:var(--dust);font-size:.9rem;padding:0;line-height:1;transition:color .15s;flex-shrink:0}
    .search-clear:hover{color:var(--bark)}
    .search-wrap.has-text .search-clear{display:block}

    .btn-gps{
      display:flex;align-items:center;gap:.35rem;
      background:var(--terra);color:#fff;
      padding:.5rem .9rem;border-radius:12px;
      font-size:.82rem;font-weight:600;border:none;cursor:pointer;
      white-space:nowrap;transition:background .2s,transform .15s,box-shadow .15s;
      flex-shrink:0;box-shadow:0 2px 8px rgba(194,82,42,.3);
    }
    .btn-gps:hover{background:#A8401E;transform:translateY(-1px);box-shadow:0 4px 16px rgba(194,82,42,.4)}
    .btn-gps.loading{opacity:.7;pointer-events:none}

    .btn-reg{
      background:var(--bark);color:var(--cream);
      padding:.5rem .9rem;border-radius:12px;
      font-size:.82rem;font-weight:600;border:none;cursor:pointer;
      white-space:nowrap;transition:background .2s,transform .15s;flex-shrink:0;
      text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;
    }
    .btn-reg:hover{background:var(--terra);transform:translateY(-1px)}

    /* ── FILTROS ── */
    .filters{
      position:fixed;top:56px;left:0;right:0;z-index:99;
      display:flex;gap:.4rem;flex-wrap:nowrap;overflow-x:auto;
      padding:.6rem 1.1rem;
      background:rgba(253,250,244,.95);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(36,26,16,.05);
      scrollbar-width:none;
      transition:right .35s cubic-bezier(.4,0,.2,1);
    }
    .filters::-webkit-scrollbar{display:none}
    body.panel-open .filters{right:var(--panel-w)}

    .fcat{
      display:flex;align-items:center;gap:.35rem;
      padding:.35rem .9rem;border-radius:100px;
      border:1.5px solid rgba(36,26,16,.12);
      background:rgba(253,250,244,.95);cursor:pointer;
      font-size:.8rem;font-weight:600;color:var(--bark);
      transition:all .2s;white-space:nowrap;flex-shrink:0;user-select:none;
    }
    .fcat:hover{border-color:var(--terra);color:var(--terra)}
    .fcat.on{background:var(--bark);color:var(--cream);border-color:var(--bark);box-shadow:0 2px 8px rgba(36,26,16,.2)}
    .dot-cat{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

    /* ── PANEL ── */
    .panel{
      position:fixed;right:0;top:0;bottom:0;z-index:200;
      width:var(--panel-w);background:var(--card);
      border-left:1px solid rgba(36,26,16,.08);display:flex;flex-direction:column;
      box-shadow:-8px 0 40px rgba(36,26,16,.1);
      transform:translateX(0);transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;
    }
    .panel.hidden{transform:translateX(100%)}
    .panel-head{
      padding:1rem 1.1rem .7rem;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(36,26,16,.07);flex-shrink:0;background:var(--card);
      position:sticky;top:0;z-index:1;padding-top:calc(56px + .8rem);
    }
    .panel-head h3{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;letter-spacing:-.01em}
    .panel-controls{display:flex;align-items:center;gap:.5rem}
    .count-badge{background:var(--terra);color:#fff;font-size:.68rem;font-weight:700;padding:.15rem .55rem;border-radius:100px;letter-spacing:.02em;transition:transform .2s}
    .count-badge.bump{animation:bump .3s ease}
    @keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
    .btn-collapse{background:var(--warm);border:none;cursor:pointer;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;transition:background .15s,transform .2s;font-size:.85rem}
    .btn-collapse:hover{background:#DDD4C4;transform:scale(1.1)}
    .panel-sort{display:flex;gap:.4rem;padding:.6rem 1.1rem;border-bottom:1px solid rgba(36,26,16,.05);flex-shrink:0}
    .sort-btn{font-size:.72rem;font-weight:600;padding:.25rem .65rem;border-radius:100px;border:1px solid rgba(36,26,16,.12);background:transparent;cursor:pointer;color:var(--dust);transition:all .15s}
    .sort-btn.on{background:var(--bark);color:var(--cream);border-color:var(--bark)}
    .panel-list{flex:1;overflow-y:auto;padding:.5rem .75rem .75rem;overscroll-behavior:contain}
    .panel-list::-webkit-scrollbar{width:3px}
    .panel-list::-webkit-scrollbar-thumb{background:rgba(36,26,16,.12);border-radius:3px}

    /* ── TAB ABRIR PANEL ── */
    .btn-open-panel{
      position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:199;
      background:var(--bark);color:var(--cream);
      padding:.85rem .55rem;border-radius:14px 0 0 14px;
      border:none;cursor:pointer;font-size:.75rem;font-weight:700;
      writing-mode:vertical-rl;letter-spacing:.06em;text-transform:uppercase;
      transition:background .2s,opacity .3s;display:flex;align-items:center;gap:.4rem;
      box-shadow:-3px 0 16px rgba(36,26,16,.15);
    }
    .btn-open-panel:hover{background:var(--terra)}
    .panel:not(.hidden) ~ .btn-open-panel{opacity:0;pointer-events:none}

    /* ── CARDS ── */
    .neg{background:var(--card);border:1.5px solid rgba(36,26,16,.07);border-radius:14px;padding:.85rem;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;margin-bottom:.45rem;position:relative;overflow:hidden}
    .neg::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--terra);transform:scaleY(0);transform-origin:bottom;transition:transform .2s;border-radius:0 2px 2px 0}
    .neg:hover{border-color:rgba(194,82,42,.3);box-shadow:0 4px 20px rgba(194,82,42,.1);transform:translateX(-2px)}
    .neg:hover::before,.neg.active::before{transform:scaleY(1)}
    .neg.active{border-color:rgba(194,82,42,.4);box-shadow:0 6px 24px rgba(194,82,42,.15);transform:translateX(-3px)}
    @keyframes cardIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    @keyframes newGlow{0%{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,165,64,.3)}60%{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,165,64,.3)}100%{border-color:rgba(36,26,16,.07);box-shadow:none}}
    .neg.is-new{animation:cardIn .4s ease both, newGlow 2s 0.4s ease both}
    .neg-top{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:.55rem}
    .neg-ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:1.1rem;flex-shrink:0}
    .neg-meta{flex:1;min-width:0}
    .neg-name{font-family:'Fraunces',serif;font-weight:700;font-size:.9rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .neg-cat-lbl{font-size:.68rem;color:var(--terra);font-weight:600;margin-top:.1rem}
    .new-pill{background:var(--gold);color:var(--bark);font-size:.58rem;font-weight:800;padding:.1rem .4rem;border-radius:100px;vertical-align:middle;margin-left:.35rem;letter-spacing:.04em;text-transform:uppercase}
    .neg-rows{display:flex;flex-direction:column;gap:.18rem;margin-bottom:.55rem}
    .neg-row{display:flex;align-items:center;gap:.35rem;font-size:.74rem;color:var(--dust);line-height:1.4}
    .neg-row svg{flex-shrink:0;opacity:.45}
    .neg-row span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .neg-foot{display:flex;align-items:center;justify-content:space-between;padding-top:.55rem;border-top:1px solid rgba(36,26,16,.06)}
    .status-dot{display:flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:600;color:var(--sage)}
    .status-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sage);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
    .neg-action{font-size:.73rem;font-weight:600;color:var(--terra);display:flex;align-items:center;gap:.2rem;transition:gap .15s}
    .neg:hover .neg-action{gap:.35rem}
    .no-res{text-align:center;padding:3rem .5rem;color:var(--dust)}
    .no-res .nr-ico{font-size:2.5rem;margin-bottom:.7rem}
    .no-res p{font-size:.85rem;line-height:1.7}
    .no-res a{color:var(--terra);font-weight:600;text-decoration:none}

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper{border-radius:18px !important;box-shadow:var(--shadow-lg) !important;border:1px solid rgba(36,26,16,.07);font-family:'DM Sans',sans-serif;padding:0 !important;overflow:hidden}
    .leaflet-popup-content{margin:0 !important;width:280px !important}
    .leaflet-popup-tip-container{display:none}
    .pu-banner{height:70px;display:flex;align-items:center;padding:0 1rem;gap:.75rem}
    .pu-ico{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:1.3rem;flex-shrink:0}
    .pu-titles{flex:1;min-width:0}
    .pu-name{font-family:'Fraunces',serif;font-weight:700;font-size:.95rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pu-cat{font-size:.68rem;color:var(--terra);font-weight:600;margin-top:.1rem}
    .pu-body{padding:.7rem 1rem;display:flex;flex-direction:column;gap:.28rem;border-top:1px solid rgba(36,26,16,.06)}
    .pu-row{display:flex;align-items:center;gap:.4rem;font-size:.76rem;color:var(--dust)}
    .pu-row svg{flex-shrink:0;opacity:.5}
    .pu-desc{font-style:italic;opacity:.75;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .pu-foot{padding:.7rem 1rem;background:var(--warm);display:flex;gap:.4rem}
    .pu-btn{flex:1;padding:.48rem .6rem;border-radius:10px;border:none;font-size:.76rem;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.3rem;transition:background .15s,transform .1s}
    .pu-btn:hover{transform:translateY(-1px)}
    .pu-p{background:var(--terra);color:#fff}.pu-p:hover{background:#A8401E}
    .pu-wsp{background:#25D366;color:#fff}.pu-wsp:hover{background:#128C7E}
    .pu-s{background:rgba(36,26,16,.09);color:var(--bark)}.pu-s:hover{background:rgba(36,26,16,.15)}

    /* ── MODAL ── */
    .modal-ov{position:fixed;inset:0;z-index:500;background:rgba(36,26,16,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-ov.open{opacity:1;pointer-events:all}
    .modal{background:var(--card);border-radius:24px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden;transform:translateY(24px) scale(.97);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;display:flex;flex-direction:column}
    .modal-ov.open .modal{transform:translateY(0) scale(1)}
    .m-banner{height:120px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;flex-shrink:0}
    .m-close{position:absolute;top:.8rem;right:.8rem;background:rgba(255,255,255,.8);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:grid;place-items:center;backdrop-filter:blur(4px);transition:background .15s,transform .15s}
    .m-close:hover{background:#fff;transform:scale(1.1)}
    .m-body{padding:1.4rem;overflow-y:auto;flex:1}
    .m-name{font-family:'Fraunces',serif;font-weight:900;font-size:1.5rem;letter-spacing:-.02em;margin-bottom:.15rem}
    .m-catl{font-size:.76rem;color:var(--terra);font-weight:600;margin-bottom:1.1rem;text-transform:uppercase;letter-spacing:.06em}
    .m-info{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.2rem}
    .m-row{display:flex;align-items:flex-start;gap:.65rem;font-size:.86rem;color:var(--dust)}
    .m-row svg{flex-shrink:0;margin-top:2px;opacity:.5}
    .m-row strong{color:var(--bark);font-weight:600}
    .m-row a{color:var(--terra);text-decoration:none;font-weight:500}
    .m-row a:hover{text-decoration:underline}
    .m-actions{display:flex;gap:.5rem;flex-wrap:wrap}
    .ma{flex:1;min-width:130px;padding:.75rem .8rem;border-radius:12px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:.4rem}
    .ma:hover{transform:translateY(-2px)}
    .ma-wsp{background:#25D366;color:#fff;box-shadow:0 3px 12px rgba(37,211,102,.3)}.ma-wsp:hover{background:#128C7E}
    .ma-ig{background:#F5E6F0;color:#C2357A}.ma-ig:hover{background:#EDD0E5}
    .ma-fb{background:#E6EEF8;color:#1A5BB5}.ma-fb:hover{background:#D0DFF0}
    .ma-s{background:var(--warm);color:var(--bark)}.ma-s:hover{background:#DDD4C4}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bark);color:var(--cream);padding:.65rem 1.3rem;border-radius:100px;font-size:.83rem;font-weight:500;z-index:1000;opacity:0;transition:all .3s cubic-bezier(.34,1.2,.64,1);white-space:nowrap;pointer-events:none;max-width:90vw;box-shadow:0 8px 24px rgba(36,26,16,.25)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── LIVE BADGE ── */
    .live-badge{display:flex;align-items:center;gap:.4rem;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:60;background:rgba(253,250,244,.97);backdrop-filter:blur(12px);border:1px solid rgba(36,26,16,.08);border-radius:100px;padding:.42rem 1rem;font-size:.76rem;font-weight:600;color:var(--dust);box-shadow:0 4px 20px rgba(36,26,16,.1);pointer-events:none;transition:opacity .3s,bottom .35s}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);animation:liveDot 2.5s infinite;flex-shrink:0}
    @keyframes liveDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
    .live-badge.updating .live-dot{background:var(--gold);animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .live-badge strong{color:var(--bark)}

    /* ── EMPTY ── */
    .empty-map{position:fixed;left:50%;top:55%;transform:translate(-50%,-50%);z-index:10;background:rgba(253,250,244,.98);backdrop-filter:blur(20px);border:1px solid rgba(36,26,16,.08);border-radius:24px;padding:2.2rem 2.5rem;text-align:center;box-shadow:var(--shadow-lg);max-width:340px;width:90%}
    .empty-map .em-ico{font-size:3rem;margin-bottom:.8rem}
    .empty-map h3{font-family:'Fraunces',serif;font-weight:900;font-size:1.25rem;margin-bottom:.5rem}
    .empty-map p{font-size:.84rem;color:var(--dust);line-height:1.65;margin-bottom:1.4rem}
    .empty-map a{display:inline-flex;align-items:center;gap:.4rem;background:var(--terra);color:#fff;padding:.7rem 1.4rem;border-radius:12px;font-size:.88rem;font-weight:600;text-decoration:none;transition:background .2s,transform .15s;box-shadow:0 4px 16px rgba(194,82,42,.3)}
    .empty-map a:hover{background:#A8401E;transform:translateY(-1px)}

    /* ── ZONA INFO ── */
    .zone-info{position:fixed;left:1rem;bottom:1.5rem;z-index:50;background:rgba(253,250,244,.95);backdrop-filter:blur(12px);border:1px solid rgba(36,26,16,.08);border-radius:12px;padding:.6rem .9rem;font-size:.78rem;color:var(--dust);box-shadow:var(--shadow-sm);pointer-events:none;transition:bottom .35s}
    .zone-info strong{color:var(--bark);font-size:.85rem}

    /* ── USER MARKER ── */
    .user-marker-wrap{width:20px;height:20px;position:relative}
    .user-marker-inner{width:16px;height:16px;border-radius:50%;background:var(--terra);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(194,82,42,.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
    .user-marker-ring{width:36px;height:36px;border-radius:50%;background:rgba(194,82,42,.15);border:1px solid rgba(194,82,42,.3);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:ring 2s infinite}
    @keyframes ring{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0}}

    /* ════════════════════════════
       MOBILE ≤ 768px
       TOPBAR → CSS GRID 2 filas:
         Fila 1: [logo]       [buscador]
         Fila 2: [btn-gps]    [btn-reg]
       FILTERS → siempre debajo del topbar
    ════════════════════════════ */

    @media(max-width:768px){
  :root{--panel-w:100%}
  body.panel-open #map{right:0}
  body.panel-open .topbar{right:0}
  body.panel-open .filters{right:0}

  .topbar{
    display:grid;
    grid-template-columns:auto 1fr;
    grid-template-rows:auto auto;
    align-items:center;
    gap:.4rem .5rem;
    padding:.6rem .9rem;
  }
  .logo{ grid-column:1; grid-row:1; }
  .search-wrap{ grid-column:2; grid-row:1; max-width:none; width:100%; }
  .btn-gps{
    grid-column:1; grid-row:2;
    width:100%; justify-content:center;
    padding:.45rem .5rem; font-size:.79rem;
  }
  .btn-reg{
    grid-column:2; grid-row:2;
    width:100%; justify-content:center;
    padding:.45rem .5rem; font-size:.79rem;
  }

  .filters{ top:108px }

  /* ── LIVE BADGE en mobile: esquina superior derecha, pequeño ── */
  .live-badge{
    bottom: auto;
    top: calc(108px + 44px + .4rem); /* debajo de los filtros */
    left: auto;
    right: .6rem;
    transform: none;
    padding: .28rem .65rem;
    font-size: .68rem;
    gap: .3rem;
    border-radius: 100px;
    opacity: .85;
  }

  /* ── ZONE INFO: oculto en mobile (info ya está en el panel) ── */
  .zone-info{ display: none; }

  /* Panel sheet desde abajo */
  .panel{
    top:auto;bottom:0;right:0;left:0;
    height:55vh;border-left:none;
    border-top:1.5px solid rgba(36,26,16,.1);
    border-radius:20px 20px 0 0;
    box-shadow:0 -8px 40px rgba(36,26,16,.15);
    transform:translateY(0);
  }
  .panel.hidden{transform:translateY(100%)}
  .panel-head{padding-top:1rem;border-radius:20px 20px 0 0}
  .panel-head::before{content:'';display:block;width:36px;height:4px;background:rgba(36,26,16,.15);border-radius:2px;position:absolute;top:.55rem;left:50%;transform:translateX(-50%)}

  .btn-open-panel{
    writing-mode:horizontal-tb;
    top:auto;right:50%;transform:translateX(50%);
    bottom:0;border-radius:14px 14px 0 0;
    padding:.5rem 1.5rem;font-size:.78rem;
  }
  .panel:not(.hidden) ~ .btn-open-panel{opacity:0;pointer-events:none}

  /* live-badge cuando el panel está abierto: se oculta */
  body.panel-open .live-badge{ opacity: 0; pointer-events: none; }

  .m-actions{flex-direction:column}
  .ma{min-width:unset}
  .modal{border-radius:20px 20px 0 0;position:fixed;bottom:0;max-height:85vh}
  .modal-ov{align-items:flex-end;padding:0}
}
  </style>
</head>
<body>

<div id="map"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Tu<span>Barrio</span><span class="flag">🇨🇱</span></div>

  <div class="search-wrap" id="searchWrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8A7768" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Buscar negocio o dirección…" oninput="onSearch(this)"/>
    <button class="search-clear" onclick="clearSearch()" title="Limpiar">✕</button>
  </div>

  <button class="btn-gps" id="gpsBtn" onclick="useGPS()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg>
    <span>Mi ubicación</span>
  </button>

  <a href="{% url 'ingresa_tu_negocio' %}" class="btn-reg">+ Registrar</a>
</div>

<!-- FILTROS -->
<div class="filters" id="filtersBar">
  <button class="fcat on" onclick="filterBy(this,'all')">🗂 Todos</button>
  <button class="fcat" onclick="filterBy(this,'comida')"><span class="dot-cat" style="background:#F5A623"></span>Comida</button>
  <button class="fcat" onclick="filterBy(this,'mini_market')"><span class="dot-cat" style="background:#5F8C68"></span>Almacenes</button>
  <button class="fcat" onclick="filterBy(this,'peluqueria')"><span class="dot-cat" style="background:#E05C8A"></span>Belleza</button>
  <button class="fcat" onclick="filterBy(this,'otros')"><span class="dot-cat" style="background:#4A90D9"></span>Otros</button>
</div>

<!-- PANEL -->
<div class="panel hidden" id="panel">
  <div class="panel-head">
    <h3>Negocios</h3>
    <div class="panel-controls">
      <span class="count-badge" id="countBadge">0</span>
      <button class="btn-collapse" onclick="togglePanel()" aria-label="Cerrar lista">✕</button>
    </div>
  </div>
  <div class="panel-sort">
    <button class="sort-btn on" onclick="setSort(this,'default')">Recientes</button>
    <button class="sort-btn" onclick="setSort(this,'az')">A–Z</button>
    <button class="sort-btn" onclick="setSort(this,'cercano')">Cerca mío</button>
  </div>
  <div class="panel-list" id="panelList"></div>
</div>
<button class="btn-open-panel" id="openPanelBtn" onclick="togglePanel()" aria-label="Ver lista">≡ Lista</button>

<!-- ZONA INFO -->
<div class="zone-info">📍 <strong id="zoneCount">0</strong> negocios</div>

<!-- LIVE BADGE -->
<div class="live-badge" id="liveBadge">
  <div class="live-dot"></div>
  <span>En vivo · <strong id="liveCount">0</strong> negocios</span>
</div>

<!-- MODAL -->
<div class="modal-ov" id="detailModal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="m-banner" id="mBanner"></div>
    <div class="m-body">
      <div class="m-name" id="mName"></div>
      <div class="m-catl" id="mCat"></div>
      <div class="m-info" id="mInfo"></div>
      <div class="m-actions" id="mActions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ════════════════════════════
   CATEGORÍAS
════════════════════════════ */
const CAT_COLOR = {comida:'#F5A623',mini_market:'#5F8C68',peluqueria:'#E05C8A',otros:'#4A90D9'};
const CAT_BG = {
  comida:'linear-gradient(135deg,#FDEBD0,#F5C99E)',
  mini_market:'linear-gradient(135deg,#D5E8D4,#A2D09E)',
  peluqueria:'linear-gradient(135deg,#F8D7DA,#F0A4AA)',
  otros:'linear-gradient(135deg,#DAE8FC,#A4C4E8)'
};
const CAT_ICO   = {comida:'🍽️',mini_market:'🛒',peluqueria:'✂️',otros:'✨'};
const CAT_LABEL = {comida:'Comida',mini_market:'Almacén / Minimarket',peluqueria:'Peluquería / Belleza',otros:'Otros servicios'};
const catLabel = c => CAT_LABEL[c]||c;
const catColor = c => CAT_COLOR[c]||'#8A7768';
const catBg    = c => CAT_BG[c]||'linear-gradient(135deg,#eee,#ccc)';
const catIco   = c => CAT_ICO[c]||'📍';

/* ════════════════════════════
   DATOS DJANGO
════════════════════════════ */
let NEGOCIOS = [
  {% for n in negocios %}
  {
    id:          {{n.id}},
    nombre:      "{{n.nombre|escapejs}}",
    cat:         "{{n.tipo|escapejs}}",
    dir:         "{{n.direccion|escapejs}}",
    dias:        "{{n.dias_atencion|escapejs}}",
    descripcion: "{{n.descripcion|default_if_none:''|escapejs}}",
    instagram:   "{{n.instagram|default_if_none:''|escapejs}}",
    facebook:    "{{n.facebook|default_if_none:''|escapejs}}",
    whatsapp:    "{{n.whatsapp|default_if_none:''|escapejs}}",
    wsp_publico: "{{n.wsp_publico|default_if_none:'no'|escapejs}}",
    lat:  {% if n.latitud %}{{n.latitud}}{% else %}null{% endif %},
    lng:  {% if n.longitud %}{{n.longitud}}{% else %}null{% endif %},
  }{% if not forloop.last %},{% endif %}
  {% endfor %}
];

/* ════════════════════════════
   STATE
════════════════════════════ */
let currentCat='all', currentSearch='', currentSort='default';
let panelOpen=false, userLat=null, userLng=null;
let map, markersLayer, activeMarkers={}, userMarker=null;
let knownIds = new Set(NEGOCIOS.map(n=>n.id));

/* Ajusta .filters justo debajo del topbar real */
function adjustFiltersTop(){
  const tb = document.querySelector('.topbar');
  const fl = document.getElementById('filtersBar');
  if(tb && fl) fl.style.top = tb.offsetHeight + 'px';
}

/* ════════════════════════════
   MAPA
════════════════════════════ */
function initMap(){
  adjustFiltersTop();
  window.addEventListener('resize', adjustFiltersTop);

  map = L.map('map',{zoomControl:false}).setView([-35.5,-71.5],6);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);

  renderAll();
  updateBadge();
  if(NEGOCIOS.length===0) showEmpty();
  if(NEGOCIOS.length>0) setTimeout(()=>togglePanel(true),600);
  setInterval(pollNegocios,30000);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDetail(); });
}

function showEmpty(){
  const div=document.createElement('div');
  div.className='empty-map';
  div.innerHTML=`<div class="em-ico">📍</div><h3>¡Sé el primero!</h3>
    <p>Aún no hay negocios en TuBarrio.<br>Registrá el tuyo gratis.</p>
    <a href="{% url 'ingresa_tu_negocio' %}">+ Registrar mi negocio</a>`;
  document.body.appendChild(div);
}

/* ════════════════════════════
   POLLING
════════════════════════════ */
async function pollNegocios(){
  const badge=document.getElementById('liveBadge');
  badge.classList.add('updating');
  try{
    const res=await fetch('/api/negocios/',{headers:{'Accept':'application/json'},cache:'no-cache'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const newOnes=[], updatedIds=new Set();
    data.forEach(n=>{
      if(!knownIds.has(n.id)){ newOnes.push(n); knownIds.add(n.id); NEGOCIOS.push(n); }
      else{
        const idx=NEGOCIOS.findIndex(x=>x.id===n.id);
        if(idx!==-1 && JSON.stringify(NEGOCIOS[idx])!==JSON.stringify(n)){ NEGOCIOS[idx]=n; updatedIds.add(n.id); }
      }
    });
    const serverIds=new Set(data.map(n=>n.id));
    NEGOCIOS=NEGOCIOS.filter(n=>serverIds.has(n.id));
    knownIds=new Set(NEGOCIOS.map(n=>n.id));
    if(newOnes.length>0||updatedIds.size>0){ renderAll(new Set([...newOnes.map(n=>n.id),...updatedIds])); updateBadge(); bumpBadge(); }
    if(newOnes.length>0){
      const nombres=newOnes.slice(0,2).map(n=>n.nombre).join(', ');
      const extra=newOnes.length>2?` y ${newOnes.length-2} más`:'';
      showToast(`🆕 ${nombres}${extra} se unió al barrio`);
      const first=newOnes.find(n=>n.lat!==null);
      if(first) map.flyTo([first.lat,first.lng],14,{duration:1.5});
    }
  }catch(e){ console.warn('Poll falló:',e); }
  finally{ badge.classList.remove('updating'); }
}

function updateBadge(){
  const n=filtered().length;
  document.getElementById('liveCount').textContent=NEGOCIOS.length;
  document.getElementById('zoneCount').textContent=n;
  document.getElementById('countBadge').textContent=n;
}
function bumpBadge(){
  const b=document.getElementById('countBadge');
  b.classList.remove('bump'); void b.offsetWidth; b.classList.add('bump');
}

/* ════════════════════════════
   ICONOS
════════════════════════════ */
function makeIcon(cat){
  const color=catColor(cat), emo=catIco(cat), size=44, r=13;
  const id=`sf_${cat}`;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${Math.round(size*1.3)}" viewBox="0 0 44 57">
    <defs><filter id="${id}"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,.25)"/></filter></defs>
    <path d="M22 2C13.163 2 6 9.163 6 18c0 13 16 37 16 37S38 31 38 18C38 9.163 30.837 2 22 2z" fill="${color}" filter="url(#${id})"/>
    <circle cx="22" cy="18" r="${r}" fill="white" opacity=".95"/>
    <text x="22" y="${18+r*.38}" text-anchor="middle" dominant-baseline="middle" font-size="${r*.95}">${emo}</text>
  </svg>`;
  return L.divIcon({html:`<div style="width:${size}px;height:${Math.round(size*1.3)}px">${svg}</div>`,className:'',iconSize:[size,Math.round(size*1.3)],iconAnchor:[size/2,Math.round(size*1.3)],popupAnchor:[0,-Math.round(size*1.3)-2]});
}

/* ════════════════════════════
   POPUP
════════════════════════════ */
function popupHTML(n){
  const wspNum=n.whatsapp?n.whatsapp.replace(/\D/g,''):'';
  const wspBtn=(n.wsp_publico==='si'&&wspNum)?`<a class="pu-btn pu-wsp" href="https://wa.me/${wspNum}" target="_blank">💬 WhatsApp</a>`:'';
  return `<div class="pu-banner" style="background:${catBg(n.cat)}">
    <div class="pu-ico" style="background:rgba(255,255,255,.6)">${catIco(n.cat)}</div>
    <div class="pu-titles"><div class="pu-name">${n.nombre}</div><div class="pu-cat">${catLabel(n.cat)}</div></div>
  </div>
  <div class="pu-body">
    <div class="pu-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${n.dir}</span></div>
    <div class="pu-row"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>${n.dias||'Horario a confirmar'}</span></div>
    ${n.descripcion?`<div class="pu-row pu-desc">${n.descripcion.substring(0,90)}${n.descripcion.length>90?'…':''}</div>`:''}
  </div>
  <div class="pu-foot"><button class="pu-btn pu-p" onclick="openDetail(${n.id})">Ver detalle →</button>${wspBtn}</div>`;
}

/* ════════════════════════════
   FILTRADO / ORDEN
════════════════════════════ */
function filtered(){
  const q=currentSearch.toLowerCase().trim();
  return NEGOCIOS.filter(n=>{
    const catOk=currentCat==='all'||n.cat===currentCat;
    const textOk=!q||n.nombre.toLowerCase().includes(q)||n.dir.toLowerCase().includes(q)||(n.descripcion||'').toLowerCase().includes(q);
    return catOk&&textOk;
  });
}
function sorted(list){
  if(currentSort==='az') return [...list].sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
  if(currentSort==='cercano'&&userLat!==null) return [...list].sort((a,b)=>{
    const da=a.lat?dist(userLat,userLng,a.lat,a.lng):9999;
    const db=b.lat?dist(userLat,userLng,b.lat,b.lng):9999;
    return da-db;
  });
  return list;
}

/* ════════════════════════════
   RENDER
════════════════════════════ */
function renderAll(newOrUpdatedIds=new Set()){
  const list=sorted(filtered());
  markersLayer.clearLayers(); activeMarkers={};
  list.forEach(n=>{
    if(n.lat===null||n.lng===null) return;
    const m=L.marker([n.lat,n.lng],{icon:makeIcon(n.cat)})
      .bindPopup(popupHTML(n),{maxWidth:310,minWidth:290,closeButton:false})
      .addTo(markersLayer);
    m.on('click',()=>highlightCard(n.id));
    activeMarkers[n.id]=m;
  });
  updateBadge();
  renderList(list,newOrUpdatedIds);
}

function renderList(list,newOrUpdatedIds=new Set()){
  const el=document.getElementById('panelList');
  if(!list.length){
    el.innerHTML=`<div class="no-res"><div class="nr-ico">🔍</div><p>No encontré negocios.<br><a href="#" onclick="clearSearch();return false">Limpiar filtros</a></p></div>`;
    return;
  }
  el.innerHTML=list.map((n,i)=>{
    const sinCoords=n.lat===null||n.lng===null;
    const isNew=newOrUpdatedIds.has(n.id);
    const distTxt=(userLat!==null&&n.lat)?`${dist(userLat,userLng,n.lat,n.lng).toFixed(1)} km · `:'';
    return `<div class="neg${isNew?' is-new':''}" id="neg-${n.id}" style="animation-delay:${Math.min(i*.04,.3)}s"
      onclick="${sinCoords?`openDetail(${n.id})`:`focusNeg(${n.id})`}" role="button" tabindex="0"
      onkeydown="if(event.key==='Enter')this.click()">
      <div class="neg-top">
        <div class="neg-ico" style="background:${catBg(n.cat)}">${catIco(n.cat)}</div>
        <div class="neg-meta">
          <div class="neg-name">${n.nombre}${isNew?'<span class="new-pill">NUEVO</span>':''}</div>
          <div class="neg-cat-lbl">${catLabel(n.cat)}</div>
        </div>
      </div>
      <div class="neg-rows">
        <div class="neg-row"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${distTxt}${n.dir}</span></div>
        <div class="neg-row"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>${n.dias||'Horario a confirmar'}</span></div>
      </div>
      <div class="neg-foot">
        <span class="status-dot">Activo</span>
        <span class="neg-action" onclick="event.stopPropagation();openDetail(${n.id})">Ver detalle →</span>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════
   UI
════════════════════════════ */
function highlightCard(id){
  document.querySelectorAll('.neg').forEach(e=>e.classList.remove('active'));
  const c=document.getElementById('neg-'+id);
  if(c){ c.classList.add('active'); c.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  if(!panelOpen) togglePanel(true);
}
function focusNeg(id){
  const n=NEGOCIOS.find(x=>x.id===id);
  if(!n||n.lat===null) return;
  highlightCard(id);
  map.flyTo([n.lat,n.lng],16,{duration:1.2});
  setTimeout(()=>activeMarkers[id]?.openPopup(),1000);
}
function filterBy(btn,cat){
  document.querySelectorAll('.fcat').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); currentCat=cat; renderAll();
  const first=filtered().find(n=>n.lat!==null);
  if(first) map.flyTo([first.lat,first.lng],12,{duration:1.2});
}
function onSearch(inp){
  currentSearch=inp.value;
  document.getElementById('searchWrap').classList.toggle('has-text',!!inp.value);
  renderAll();
  const q=currentSearch.toLowerCase().trim();
  if(q.length>=3){
    const match=NEGOCIOS.find(n=>n.lat!==null&&(n.nombre.toLowerCase().includes(q)||n.dir.toLowerCase().includes(q)));
    if(match) map.flyTo([match.lat,match.lng],15,{duration:1.2});
  }
}
function clearSearch(){
  const inp=document.getElementById('searchInput');
  inp.value=''; currentSearch='';
  document.getElementById('searchWrap').classList.remove('has-text');
  renderAll(); inp.focus();
}
function setSort(btn,sort){
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); currentSort=sort;
  if(sort==='cercano'&&userLat===null){ showToast('Activa "Mi ubicación" primero 📍'); return; }
  renderAll();
}
function togglePanel(forceOpen){
  if(forceOpen===true) panelOpen=true;
  else if(forceOpen===false) panelOpen=false;
  else panelOpen=!panelOpen;
  document.getElementById('panel').classList.toggle('hidden',!panelOpen);
  document.body.classList.toggle('panel-open',panelOpen);
  setTimeout(()=>map?.invalidateSize(),360);
}

/* ════════════════════════════
   GPS
════════════════════════════ */
function dist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function useGPS(){
  const btn=document.getElementById('gpsBtn');
  if(!navigator.geolocation){ showToast('Tu navegador no tiene GPS 😅'); return; }
  btn.classList.add('loading');
  btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Buscando…</span>`;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLat=pos.coords.latitude; userLng=pos.coords.longitude;
      if(userMarker) map.removeLayer(userMarker);
      const icon=L.divIcon({html:`<div class="user-marker-wrap"><div class="user-marker-ring"></div><div class="user-marker-inner"></div></div>`,className:'',iconSize:[20,20],iconAnchor:[10,10]});
      userMarker=L.marker([userLat,userLng],{icon,zIndexOffset:1000}).addTo(map).bindPopup('<strong>📍 Estás aquí</strong>').openPopup();
      const conCoords=NEGOCIOS.filter(n=>n.lat!==null);
      if(conCoords.length>0){
        conCoords.sort((a,b)=>dist(userLat,userLng,a.lat,a.lng)-dist(userLat,userLng,b.lat,b.lng));
        const nearest=conCoords[0], d=dist(userLat,userLng,nearest.lat,nearest.lng);
        if(d<50){ map.flyTo([userLat,userLng],14,{duration:1.5}); showToast(`✅ Más cercano: ${nearest.nombre} (${d.toFixed(1)} km)`); setTimeout(()=>activeMarkers[nearest.id]?.openPopup(),1600); }
        else{ map.flyTo([userLat,userLng],13,{duration:1.5}); showToast('📍 ¡Ubicación encontrada! Sin negocios muy cerca aún.'); }
      } else{ map.flyTo([userLat,userLng],14,{duration:1.5}); showToast('📍 ¡Te encontramos!'); }
      btn.classList.remove('loading'); btn.classList.add('located');
      btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg><span>✓ Ubicado</span>`;
      if(currentSort==='cercano') renderAll();
    },
    ()=>{
      btn.classList.remove('loading');
      btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8"/></svg><span>Mi ubicación</span>`;
      showToast('No se pudo acceder al GPS 🙏');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

/* ════════════════════════════
   MODAL
════════════════════════════ */
function openDetail(id){
  const n=NEGOCIOS.find(x=>x.id===id); if(!n) return;
  const bann=document.getElementById('mBanner');
  bann.style.background=catBg(n.cat);
  bann.innerHTML=`<span style="font-size:3rem">${catIco(n.cat)}</span><button class="m-close" onclick="closeDetail()" aria-label="Cerrar">✕</button>`;
  document.getElementById('mName').textContent=n.nombre;
  document.getElementById('mCat').textContent=catLabel(n.cat);
  let html='';
  html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span><strong>Dirección:</strong> ${n.dir}</span></div>`;
  html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span><strong>Atención:</strong> ${n.dias||'A confirmar'}</span></div>`;
  if(n.descripcion) html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${n.descripcion}</span></div>`;
  if(n.instagram){ const u=n.instagram.startsWith('http')?n.instagram:`https://instagram.com/${n.instagram.replace('@','')}`; html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg><span><strong>Instagram:</strong> <a href="${u}" target="_blank" rel="noopener">${n.instagram}</a></span></div>`; }
  if(n.facebook){ const u=n.facebook.startsWith('http')?n.facebook:`https://facebook.com/${n.facebook}`; html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg><span><strong>Facebook:</strong> <a href="${u}" target="_blank" rel="noopener">${n.facebook}</a></span></div>`; }
  if(n.wsp_publico==='si'&&n.whatsapp){ const num=n.whatsapp.replace(/\D/g,''); html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span><strong>WhatsApp:</strong> <a href="https://wa.me/${num}" target="_blank" rel="noopener">${n.whatsapp}</a></span></div>`; }
  if(userLat!==null&&n.lat){ const d=dist(userLat,userLng,n.lat,n.lng); html+=`<div class="m-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg><span style="color:var(--sage);font-weight:600">A ${d.toFixed(1)} km de tu ubicación</span></div>`; }
  document.getElementById('mInfo').innerHTML=html;
  let actions='';
  if(n.wsp_publico==='si'&&n.whatsapp){ const num=n.whatsapp.replace(/\D/g,''); actions+=`<a class="ma ma-wsp" href="https://wa.me/${num}" target="_blank" rel="noopener">💬 WhatsApp</a>`; }
  if(n.instagram){ const u=n.instagram.startsWith('http')?n.instagram:`https://instagram.com/${n.instagram.replace('@','')}`; actions+=`<a class="ma ma-ig" href="${u}" target="_blank" rel="noopener">📸 Instagram</a>`; }
  if(n.facebook){ const u=n.facebook.startsWith('http')?n.facebook:`https://facebook.com/${n.facebook}`; actions+=`<a class="ma ma-fb" href="${u}" target="_blank" rel="noopener">📘 Facebook</a>`; }
  actions+=`<button class="ma ma-s" onclick="closeDetail()">Cerrar</button>`;
  document.getElementById('mActions').innerHTML=actions;
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('detailModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeDetail(); });

/* ════════════════════════════
   TOAST
════════════════════════════ */
let toastTimer;
function showToast(msg,duration=3500){
  const t=document.getElementById('toast');
  clearTimeout(toastTimer); t.textContent=msg; t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),duration);
}

window.addEventListener('load',initMap);
</script>
